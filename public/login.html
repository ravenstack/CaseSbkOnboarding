<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>StepUp - Login Corporativo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            "colors": {
                "deep-navy": "#0F172A",
                "primary": "#006579",
                "primary-container": "#197f96",
                "surface-container-low": "#f2f4f6",
                "background": "#f7f9fb",
                "slate-gray": "#64748B",
                "lime-accent": "#00D3DC",
                "on-surface": "#191c1e"
            },
            "fontFamily": {
                "sans": ["Hanken Grotesk"]
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background text-on-surface font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 p-8 shadow-xl flex flex-col gap-6 relative overflow-hidden">
        <div class="absolute right-0 top-0 w-24 h-24 bg-gradient-to-bl from-lime-accent/20 to-transparent pointer-events-none"></div>
        
        <div class="text-center flex flex-col items-center gap-2">
            <div class="w-12 h-12 bg-deep-navy text-lime-accent rounded-xl flex items-center justify-center shadow-md">
                <span class="material-symbols-outlined text-3xl">rocket_launch</span>
            </div>
            <h1 class="text-2xl font-black text-deep-navy mt-2">Plataforma StepUp</h1>
            <p class="text-sm text-slate-gray">Selecione uma persona abaixo para simular e testar o fluxo de onboarding do MVP</p>
        </div>

        <hr class="border-slate-100">

        <div class="flex flex-col gap-3">
            <span class="text-xs font-bold uppercase tracking-wider text-slate-gray mb-1">Acessos Rápidos de Simulação</span>

            <button onclick="fazerLoginSimulado('colaborador')" class="w-full flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-surface-container-low hover:bg-indigo-50 hover:border-indigo-300 group text-left transition-all active:scale-[0.98]">
                <div class="w-10 h-10 rounded-lg bg-indigo-100 text-indigo-700 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-colors shrink-0">
                    <span class="material-symbols-outlined">person</span>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-deep-navy group-hover:text-indigo-900 transition-colors">Pedro Alencar (adm1)</h3>
                    <p class="text-xs text-slate-gray group-hover:text-indigo-700">Novo Colaborador — Visão de Roteiro Pessoal</p>
                </div>
                <span class="material-symbols-outlined text-slate-gray group-hover:translate-x-1 transition-transform">chevron_right</span>
            </button>

            <button onclick="fazerLoginSimulado('rh')" class="w-full flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-surface-container-low hover:bg-teal-50 hover:border-teal-300 group text-left transition-all active:scale-[0.98]">
                <div class="w-10 h-10 rounded-lg bg-teal-100 text-teal-700 flex items-center justify-center group-hover:bg-teal-600 group-hover:text-white transition-colors shrink-0">
                    <span class="material-symbols-outlined">badge</span>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-deep-navy group-hover:text-teal-900 transition-colors">Mariana Costa</h3>
                    <p class="text-xs text-slate-gray group-hover:text-teal-700">Equipe de Atração (RH) — Valida Fase 1</p>
                </div>
                <span class="material-symbols-outlined text-slate-gray group-hover:translate-x-1 transition-transform">chevron_right</span>
            </button>

            <button onclick="fazerLoginSimulado('ti')" class="w-full flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-surface-container-low hover:bg-cyan-50 hover:border-cyan-300 group text-left transition-all active:scale-[0.98]">
                <div class="w-10 h-10 rounded-lg bg-cyan-100 text-cyan-700 flex items-center justify-center group-hover:bg-cyan-600 group-hover:text-white transition-colors shrink-0">
                    <span class="material-symbols-outlined">desktop_mac</span>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-deep-navy group-hover:text-cyan-900 transition-colors">Lucas Rezende</h3>
                    <p class="text-xs text-slate-gray group-hover:text-cyan-700">Infraestrutura (TI) — Valida Fase 2</p>
                </div>
                <span class="material-symbols-outlined text-slate-gray group-hover:translate-x-1 transition-transform">chevron_right</span>
            </button>

            <button onclick="fazerLoginSimulado('gestor')" class="w-full flex items-center gap-4 p-4 rounded-xl border border-slate-200 bg-surface-container-low hover:bg-amber-50 hover:border-amber-300 group text-left transition-all active:scale-[0.98]">
                <div class="w-10 h-10 rounded-lg bg-amber-100 text-amber-700 flex items-center justify-center group-hover:bg-amber-600 group-hover:text-white transition-colors shrink-0">
                    <span class="material-symbols-outlined">supervisor_account</span>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-deep-navy group-hover:text-amber-900 transition-colors">Carlos Mendes (adm2)</h3>
                    <p class="text-xs text-slate-gray group-hover:text-amber-700">Gestor de Engenharia — Gestão Geral / Fase 3</p>
                </div>
                <span class="material-symbols-outlined text-slate-gray group-hover:translate-x-1 transition-transform">chevron_right</span>
            </button>
        </div>

        <div class="text-center">
            <span class="text-[11px] bg-slate-100 px-3 py-1 rounded text-slate-500 font-mono tracking-wide">StepUp MVP v1.0.0</span>
        </div>
    </div>

    <script>
        function fazerLoginSimulado(perfil) {
            console.log(`Inicializando sessão simulada para: ${perfil}`);
            
            if (perfil === 'colaborador') {
                // Redireciona diretamente para a visão pessoal do colaborador Pedro Alencar (ID 1)
                window.location.href = "dashboard_colab.html";
            } else {
                // Redireciona para o painel de gestão compartilhada (index.html)
                // Passa o perfil via parâmetro na URL (?role=rh ou ?role=ti ou ?role=gestor) 
                // para que a sua página saiba qual tabela ou filtros renderizar
                window.location.href = `index.html?role=${perfil}`;
            }
        }
    </script>
</body>
</html>
